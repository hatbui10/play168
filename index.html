<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Master Pro - Fixed</title>
    <style>
        :root { --neon: #00f3ff; --pink: #ff00ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 30px 3px 0 3px; }
        .box { max-width: 950px; margin: 0 auto; background: #111; padding: 20px; border: 1px solid #333; border-radius: 12px; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; justify-content: center; }
        input, button { background: #000; border: 1px solid var(--neon); color: #fff; padding: 12px; border-radius: 6px; outline: none; }
        button { border-color: var(--pink); color: var(--pink); cursor: pointer; font-weight: bold; }
        button:hover { background: var(--pink); color: #000; }
        .status { color: var(--neon); font-size: 13px; text-align: center; margin-bottom: 10px; font-family: monospace; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        textarea { width: 100%; height: 500px; background: #000; color: #00ff41; border: 1px solid #222; padding: 10px; font-family: monospace; font-size: 16px; resize: none; box-sizing: border-box; }
        #num { width: 120px; text-align: center; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="box">
    <div id="msg" class="status">Sẵn sàng | Đã lọc trùng dữ liệu</div>
    <div class="controls">
        <input type="file" id="f" multiple>
        <input type="number" id="num" placeholder="Số..." inputmode="numeric">
        <div style="display:flex; gap:5px;">
            <button onclick="calc(1)">Loại 1</button>
            <button onclick="calc(2)">Loại 2</button>
            <button onclick="calc(3)">Loại 3</button>
            <button onclick="calc(4)">Loại 4</button>
        </div>
        <button onclick="reset()" style="border-color:red; color:red">XÓA</button>
    </div>

    <div class="grid">
        <div>
            <label style="font-size:11px; color:#888">NHỎ (< 5) - DÀI NHẤT TRÊN</label>
            <textarea id="os" readonly></textarea>
        </div>
        <div>
            <label style="font-size:11px; color:#888">LỚN (≥ 5) - DÀI NHẤT TRÊN</label>
            <textarea id="ol" readonly></textarea>
        </div>
    </div>
</div>

<script>
    let raw = localStorage.getItem('big_data') || "";

    if (raw) {
        document.getElementById('msg').innerText = "Đã khôi phục " + raw.length + " ký tự số.";
    }

    document.getElementById('f').onchange = async (e) => {
        const files = e.target.files;
        document.getElementById('msg').innerText = "Đang xử lý...";
        
        let newContent = "";
        for (let file of files) {
            let t = await file.text();
            // Dòng 83 đã được sửa lại: Dùng chuỗi thay vì Regex phức tạp để tránh lỗi Invalid Expression
            let clean = t.replace(/\//gi, '').replace(/[^0-9]/g, '');
            newContent += clean;
        }

        // Kiểm tra trùng và nạp thêm
        if (!raw.includes(newContent)) {
            raw += newContent;
        }

        try {
            localStorage.setItem('big_data', raw);
        } catch(e) {
            console.log("Dữ liệu quá lớn cho LocalStorage");
        }
        
        document.getElementById('msg').innerText = "Nạp xong! Tổng số: " + raw.length;
        document.getElementById('num').focus();
    };

    function calc(type) {
        const target = document.getElementById('num').value.trim();
        if (!target || target.length !== type) {
            alert("Nhập đúng " + type + " số!"); return;
        }

        let resS = new Set();
        let resL = new Set();
        let i = raw.indexOf(target);

        while (i !== -1) {
            let start = i + target.length;
            
            // Nhánh nhỏ < 5
            let s = "";
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n < 5) s += n; else break;
            }
            if (s) resS.add(target + "-" + s);

            // Nhánh lớn >= 5
            let l = "";
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n >= 5) l += n; else break;
            }
            if (l) resL.add(target + "-" + l);

            i = raw.indexOf(target, i + 1);
        }

        const sortFn = (a, b) => b.length - a.length;
        document.getElementById('os').value = Array.from(resS).sort(sortFn).join('\n');
        document.getElementById('ol').value = Array.from(resL).sort(sortFn).join('\n');
        document.getElementById('msg').innerText = "Hoàn thành!";
    }

    function reset() {
        if (confirm("Xóa sạch toàn bộ?")) {
            localStorage.clear();
            raw = "";
            location.reload();
        }
    }
</script>
</body>
</html>
