<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN168 PRO - Multi-Mode</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 30px 3px 0 3px; /* Quy tắc 3 cạnh */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 15px;
            background: #111;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
        }

        .mode-btn.active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .upload-section {
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        .btn-upload {
            display: block;
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #00ffaa;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 25px;
        }

        .num-box {
            width: 50px;
            height: 70px;
            background: #111;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        #input-node {
            background: #1a1a1a;
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            outline: none;
            text-align: center;
            caret-color: transparent;
        }

        .result-box {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            background: #0a0a0a;
            border-radius: 12px;
            text-align: center;
            min-height: 60px;
        }

        .congrats {
            color: #ffff00;
            font-size: 26px;
            font-weight: 900;
            text-shadow: 0 0 20px #ffff00;
            animation: flash 0.5s infinite alternate;
        }

        @keyframes flash {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="mode-selector">
        <button class="mode-btn" onclick="setMode(3)" id="m3">CHẾ ĐỘ 3 (+1)</button>
        <button class="mode-btn" onclick="setMode(4)" id="m4">CHẾ ĐỘ 4 (+1)</button>
        <button class="mode-btn active" onclick="setMode(5)" id="m5">CHẾ ĐỘ 5 (+1)</button>
    </div>

    <div class="upload-section">
        <label class="btn-upload">
            + TẢI FILE DỮ LIỆU (.TXT)
            <input type="file" id="file-input" hidden accept=".txt">
        </label>
    </div>

    <div class="input-group" id="display-container">
        </div>

    <div class="result-box">
        <div id="status-msg">CHỜ DỮ LIỆU...</div>
    </div>

<script>
    let currentMode = 5;
    let masterData = localStorage.getItem('master_data_v3') || "";
    let slots = []; // Chỉ lưu các số trong các ô tĩnh

    const displayContainer = document.getElementById('display-container');
    const statusMsg = document.getElementById('status-msg');
    const fileInput = document.getElementById('file-input');

    window.onload = () => {
        setMode(5);
        if (masterData) updateStatus(`Đã nạp ${masterData.length} số.`);
    };

    document.addEventListener('click', () => {
        const input = document.getElementById('input-node');
        if (input) input.focus();
    });

    function setMode(m) {
        currentMode = m;
        [3, 4, 5].forEach(num => {
            document.getElementById(`m${num}`).classList.toggle('active', num === m);
        });

        // Khởi tạo mảng slots cho các ô TĨNH (bằng đúng số lượng mode chọn)
        slots = Array(m).fill("-");
        renderSlots();
    }

    function renderSlots() {
        displayContainer.innerHTML = "";
        
        // Tạo các ô tĩnh (3, 4 hoặc 5 ô tùy mode)
        for (let i = 0; i < currentMode; i++) {
            const div = document.createElement('div');
            div.className = "num-box";
            div.id = `slot-${i}`;
            div.innerText = slots[i];
            displayContainer.appendChild(div);
        }

        // Tạo thêm 1 ô NHẬP ở cuối
        const input = document.createElement('input');
        input.type = "number";
        input.pattern = "\\d*";
        input.inputmode = "numeric";
        input.className = "num-box";
        input.id = "input-node";
        input.placeholder = "?";
        
        input.addEventListener('input', handleInput);
        displayContainer.appendChild(input);
        input.focus();
    }

    function handleInput(e) {
        const val = e.target.value.slice(-1);
        if (val >= '0' && val <= '9') {
            // Dịch trái: Đẩy số mới vào cuối dãy ô tĩnh
            slots.shift();
            slots.push(val);

            // Cập nhật giao diện các ô tĩnh
            for (let i = 0; i < currentMode; i++) {
                document.getElementById(`slot-${i}`).innerText = slots[i];
            }

            checkMatch();
        }
        e.target.value = "";
    }

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const text = await file.text();
        const cleanNumbers = text.match(/\d/g)?.join("") || "";
        
        masterData += cleanNumbers;
        localStorage.setItem('master_data_v3', masterData);
        updateStatus(`Tổng: ${masterData.length} số.`);
    });

    function checkMatch() {
        if (slots.includes("-")) return;
        
        const sequence = slots.join("");
        if (masterData.includes(sequence)) {
            statusMsg.innerHTML = `<span class="congrats">XIN CHÚC MỪNG!</span><br>Dãy số: ${sequence}`;
        } else {
            statusMsg.innerHTML = `KHÔNG CÓ TRONG FILE<br>(${sequence})`;
            statusMsg.className = "";
        }
    }

    function updateStatus(msg) {
        statusMsg.innerText = msg;
    }
</script>

</body>
</html>
