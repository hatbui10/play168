<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Master Pro - Auto Scan</title>
    <style>
        :root { 
            --neon: #00f3ff; 
            --pink: #ff00ff; 
            --bg: #030305;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 255, 0.05) 0%, transparent 50%);
            color: #fff; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 30px 3px 0 3px; /* Rule: 30px top, 3px sides */
            min-height: 100vh;
        }

        .box { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 25px; 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .status { 
            color: var(--neon); 
            font-size: 13px; 
            text-align: center; 
            margin-bottom: 20px; 
            font-family: monospace;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
            letter-spacing: 1px;
        }

        .controls { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            margin-bottom: 25px; 
            justify-content: center; 
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input { 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 12px; 
            border-radius: 8px; 
            outline: none; 
            transition: 0.3s;
            font-weight: bold;
        }

        /* Ô nhập chính N */
        #numN { 
            width: 100px; 
            text-align: center; 
            font-size: 1.5em; 
            border-color: var(--neon);
            color: var(--neon);
            letter-spacing: 5px;
        }

        /* Ô nhập phụ M */
        #numM { 
            width: 60px; 
            text-align: center; 
            font-size: 1.5em; 
            border-color: var(--pink);
            color: var(--pink);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
        }

        #numM:focus {
            box-shadow: 0 0 15px var(--pink);
            border-color: var(--pink);
        }

        button { 
            background: transparent;
            border: 1px solid #ff4444; 
            color: #ff4444; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { 
            background: #ff4444; 
            color: #fff; 
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
        }

        textarea { 
            width: 100%; 
            height: 500px; 
            background: rgba(0, 0, 0, 0.4); 
            color: #00ff41; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 15px; 
            font-family: 'Consolas', monospace; 
            font-size: 18px; 
            resize: none; 
            box-sizing: border-box; 
            scrollbar-width: thin;
            scrollbar-color: var(--neon) transparent;
        }

        .input-label {
            font-size: 12px;
            color: var(--neon);
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <div id="msg" class="status">HỆ THỐNG SẴN SÀNG</div>
    
    <div class="controls">
        <input type="file" id="f" multiple style="width: 200px;">
        
        <div class="input-group">
            <span class="input-label">Ô N:</span>
            <input type="text" id="numN" placeholder="---" readonly>
            
            <span class="input-label" style="color: var(--pink);">Ô M:</span>
            <input type="number" id="numM" placeholder="0" inputmode="numeric">
        </div>
        
        <button onclick="reset()">Xóa sạch</button>
    </div>

    <div class="grid">
        <div class="col">
            <label>Dãy Nhỏ (< 5)</label>
            <textarea id="os" readonly></textarea>
        </div>
        <div class="col">
            <label>Dãy Lớn (≥ 5)</label>
            <textarea id="ol" readonly></textarea>
        </div>
    </div>
</div>

<script>
    let raw = localStorage.getItem('big_data') || "";
    const inputN = document.getElementById('numN');
    const inputM = document.getElementById('numM');
    const outS = document.getElementById('os');
    const outL = document.getElementById('ol');
    const msg = document.getElementById('msg');

    if (raw) msg.innerText = "ĐÃ KHÔI PHỤC " + raw.length + " KÝ TỰ";

    // Xử lý nạp file
    document.getElementById('f').onchange = async (e) => {
        msg.innerText = "ĐANG NẠP DỮ LIỆU...";
        let newContent = "";
        for (let file of e.target.files) {
            let t = await file.text();
           

 newContent += t.replace(/\s+/g, '').replace(/[^0-9]/g, '');

 }
        if (!raw.includes(newContent)) raw += newContent;
        localStorage.setItem('big_data', raw);
        msg.innerText = "NẠP XONG! TỔNG: " + raw.length;
        inputM.focus();
    };

    // Logic dịch chuyển số từ M sang N
    inputM.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (val.length === 0) return;

        // Lấy số cuối cùng vừa nhập vào M
        const lastDigit = val.slice(-1);
        
        // Cập nhật chuỗi trong ô N (Dịch trái)
        let currentN = inputN.value.replace(/[^0-9]/g, '');
        currentN += lastDigit;
        
        // Giữ tối đa 3 số cuối
        if (currentN.length > 3) {
            currentN = currentN.slice(-3);
        }
        
        inputN.value = currentN;
        
        // Xóa ô M để nhập tiếp
        inputM.value = "";

        // Tự động quét nếu đủ số (Bạn có thể chỉnh lại nế muốn quét cả khi có 1 hoặc 2 số)
        if (currentN.length > 0) {
            autoCalc(currentN);
        }
    });

    function autoCalc(target) {
        if (!raw) return;
        
        let resS = new Set();
        let resL = new Set();
        let i = raw.indexOf(target);

        while (i !== -1) {
            let start = i + target.length;
            
            // Nhánh nhỏ < 5
            let s = "";
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n < 5) s += n; else break;
            }
            if (s) resS.add(target + "-" + s);

            // Nhánh lớn >= 5
            let l = "";
            for (let k = start; k < raw.length; k++) {
                let n = parseInt(raw[k]);
                if (n >= 5) l += n; else break;
            }
            if (l) resL.add(target + "-" + l);

            i = raw.indexOf(target, i + 1);
        }

        const sortFn = (a, b) => b.length - a.length;
        outS.value = Array.from(resS).sort(sortFn).join('\n');
        outL.value = Array.from(resL).sort(sortFn).join('\n');
        msg.innerText = "ĐANG QUÉT SỐ: " + target;
    }

    function reset() {
        if (confirm("XÓA TOÀN BỘ DỮ LIỆU?")) {
            localStorage.clear();
            raw = "";
            location.reload();
        }
    }

    // Luôn giữ focus vào ô M
    document.addEventListener('click', () => inputM.focus());
</script>
</body>
</html>
